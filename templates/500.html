<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connection Interrupted | DADSON</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --purple: #3e1b2f;
            --gold: #d4af37;
            --cream: #fdfcfb;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--purple);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 4rem 3rem;
            border-radius: 24px;
            max-width: 550px;
            width: 100%;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }
        .icon-container {
            font-size: 4rem;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            letter-spacing: 0.02em;
            color: #fff;
        }
        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2.5rem;
        }
        .btn-retry {
            display: inline-block;
            background: linear-gradient(135deg, var(--gold), #f3d078);
            color: #3e1b2f !important;
            text-decoration: none;
            padding: 1.1rem 2.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.15);
        }
        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.3);
        }
        .logo-footer {
            margin-top: 3rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-container">
            <i class="fas fa-wifi"></i>
        </div>
        <h1>Connection Lost</h1>
        <p>We are experiencing a temporary network issue. If you are offline, please check your internet connection. Otherwise, we'll be back online in a moment.</p>
        <button onclick="window.location.reload()" class="btn-retry">Retry Connection</button>
        <div class="logo-footer">DADSON</div>
    </div>
</body>
</html>
